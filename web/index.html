<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Garmin Sidescan</title>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
<link rel="stylesheet" href="/style.css" />
</head>
<body>
<div id="map"></div>

<div id="topbar">
  <strong>Garmin Sidescan</strong>
  <span id="status">…</span>
  <button id="new-run" hidden>+ New run</button>
  <button id="logout" hidden>log out</button>
</div>

<aside id="drawer" hidden>
  <button id="drawer-close" title="close">×</button>
  <h2>New mosaic run</h2>

  <label class="fld">RSD file
    <select id="rsd-select"></select>
  </label>
  <label class="fld">…or upload a new one
    <input id="rsd-file" type="file" accept=".RSD,.rsd" />
  </label>

  <details id="params">
    <summary>Parameters <span class="muted">(defaults are faithful to the original)</span></summary>
    <div id="params-body"></div>
    <button id="params-reset" type="button">reset to defaults</button>
  </details>

  <button id="run-btn">Run mosaic</button>

  <div id="run-progress" hidden>
    <div class="bar"><div id="run-bar"></div></div>
    <p id="run-desc" class="muted"></p>
  </div>
</aside>

<aside id="panel" hidden>
  <button id="panel-close" title="close">×</button>
  <h2 id="panel-title">Track</h2>
  <div id="panel-body"></div>
</aside>

<div id="login" hidden>
  <form id="login-form">
    <h2>Garmin Sidescan</h2>
    <p>Enter the shared password.</p>
    <input id="password" type="password" autocomplete="current-password" placeholder="Password" />
    <button type="submit">Enter</button>
    <p id="login-error" class="error" hidden>Wrong password</p>
  </form>
</div>

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script src="/app.js"></script>
</body>
</html>
